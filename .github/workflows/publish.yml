name: Publish leaderboards to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - 'results/**'
      - 'scripts/build_leaderboards.py'
      - 'scripts/sync_to_hf.py'
      - 'hf_README.md'
  workflow_dispatch:

concurrency:
  group: publish-leaderboards
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so build_leaderboards.py can look up
          # the original git author of each results/*.yaml file via
          # `git log --follow --diff-filter=A`.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml huggingface_hub

      - name: Run unit tests
        run: python -m unittest tests.test_scripts -v

      - name: Validate YAML submissions
        run: python scripts/validate_yamls.py --results-dir results

      - name: Rebuild leaderboards
        run: python scripts/build_leaderboards.py --results-dir results --out-dir leaderboards

      - name: Update contributors list
        run: python scripts/update_contributors.py

      - name: Open PR for regenerated leaderboards (if changed)
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          branch: chore/regenerate-leaderboards
          title: "chore: regenerate leaderboards"
          body: |
            Auto-regenerated by `publish.yml` after a change under
            `results/`. Includes updated leaderboard CSVs, contributors
            list, and marker blocks in README.md / hf_README.md.

            Source commit: ${{ github.sha }}
          commit-message: "chore: regenerate leaderboards and contributors"
          add-paths: |
            leaderboards/
            CONTRIBUTORS.md
            README.md
            hf_README.md
          delete-branch: true

      - name: Sync CSVs + README to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/sync_to_hf.py --commit-message "Sync leaderboards from GitHub ${{ github.sha }}"
